<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 960">
  <defs>
    <linearGradient id="bgA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1D24"/>
      <stop offset="100%" stop-color="#06080B"/>
    </linearGradient>
    <linearGradient id="metalRedA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF4D52"/>
      <stop offset="45%" stop-color="#D62035"/>
      <stop offset="100%" stop-color="#7A0816"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FF4D52" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#FF4D52" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#FF4D52" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="960" fill="url(#bgA)"/>

  <!-- Soft glow behind logo -->
  <ellipse cx="540" cy="480" rx="380" ry="380" fill="url(#glowA)"/>

  <!-- Large Plugin Logo: Hexagon + EQ Bars (scaled 1.6x from 512 base = ~819 high) -->
  <g transform="translate(280, 240) scale(1.0)">
    <!-- Hexagon outline -->
    <polygon points="256,90 410,178 410,334 256,422 102,334 102,178"
             fill="none" stroke="url(#metalRedA)" stroke-width="22" stroke-linejoin="round"/>
    <!-- Equalizer bars -->
    <g fill="url(#metalRedA)">
      <rect x="170" y="240" width="28" height="80"  rx="8"/>
      <rect x="212" y="180" width="28" height="140" rx="8"/>
      <rect x="254" y="210" width="28" height="110" rx="8"/>
      <rect x="296" y="170" width="28" height="150" rx="8"/>
      <rect x="338" y="225" width="28" height="95"  rx="8"/>
    </g>
  </g>

  <!-- Right side: Wordmark + Tagline + Bullets -->
  <text x="960" y="320"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif"
        font-size="100" font-weight="800" fill="#FFFFFF" letter-spacing="-3">Stream Deck</text>
  <text x="960" y="440"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif"
        font-size="100" font-weight="800" fill="url(#metalRedA)" letter-spacing="-3">Musik Viewer</text>
  <text x="965" y="510"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif"
        font-size="34" font-weight="400" fill="#9CA3AF">Apple Music live on the Stream Deck + encoder.</text>

  <!-- Feature bullets -->
  <g font-family="-apple-system, sans-serif" font-size="28" fill="#E5E5E5">
    <g transform="translate(965, 620)">
      <circle cx="0" cy="-9" r="5" fill="url(#metalRedA)"/>
      <text x="22" y="0" font-weight="500">Album cover as full-screen display</text>
    </g>
    <g transform="translate(965, 680)">
      <circle cx="0" cy="-9" r="5" fill="url(#metalRedA)"/>
      <text x="22" y="0" font-weight="500">Scrolling track title + artist</text>
    </g>
    <g transform="translate(965, 740)">
      <circle cx="0" cy="-9" r="5" fill="url(#metalRedA)"/>
      <text x="22" y="0" font-weight="500">Instant volume control via the dial</text>
    </g>
    <g transform="translate(965, 800)">
      <circle cx="0" cy="-9" r="5" fill="url(#metalRedA)"/>
      <text x="22" y="0" font-weight="500">Touch-tap for play / pause</text>
    </g>
  </g>
</svg>
