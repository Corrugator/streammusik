<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 960">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1F2329"/>
      <stop offset="100%" stop-color="#0A0C0F"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2DD4BF"/>
      <stop offset="100%" stop-color="#22B8A1"/>
    </linearGradient>
  </defs>

  <rect width="1920" height="960" fill="url(#bg1)"/>

  <!-- Left: Encoder display mockup (200x100 scaled 4.4x → 880x440, framed) -->
  <g transform="translate(140, 260)">
    <!-- Outer frame (Stream Deck+ look) -->
    <rect x="0" y="0" width="880" height="440" rx="32" fill="#000000" stroke="#2A2F38" stroke-width="3"/>
    <!-- Display area -->
    <rect x="20" y="20" width="840" height="400" rx="14" fill="#0E1014"/>

    <!-- Track name (big, bold, white) -->
    <text x="440" y="120" text-anchor="middle"
          font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif"
          font-size="56" font-weight="700" fill="#FFFFFF">Hotel California</text>
    <!-- Artist (smaller, grey) -->
    <text x="440" y="180" text-anchor="middle"
          font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif"
          font-size="42" font-weight="400" fill="#B8B8B8">Eagles</text>

    <!-- Cover art placeholder (left) -->
    <rect x="60" y="220" width="170" height="170" rx="6" fill="#8B5A2B"/>
    <rect x="60" y="220" width="170" height="170" rx="6" fill="url(#bar)" opacity="0.35"/>

    <!-- Volume value (right) -->
    <text x="820" y="280" text-anchor="end"
          font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif"
          font-size="48" font-weight="600" fill="#FFFFFF">62%</text>

    <!-- Volume bar (bottom right area) -->
    <rect x="260" y="350" width="560" height="36" rx="6" fill="#2A2F38"/>
    <rect x="260" y="350" width="347" height="36" rx="6" fill="url(#bar)"/>
  </g>

  <!-- Right side: headline + description -->
  <text x="1100" y="380"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif"
        font-size="80" font-weight="800" fill="#FFFFFF" letter-spacing="-2">See what's</text>
  <text x="1100" y="475"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif"
        font-size="80" font-weight="800" fill="#2DD4BF" letter-spacing="-2">playing.</text>
  <text x="1102" y="565"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif"
        font-size="34" font-weight="400" fill="#9CA3AF">Album cover, track title and artist —</text>
  <text x="1102" y="612"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif"
        font-size="34" font-weight="400" fill="#9CA3AF">right on your Stream Deck + encoder.</text>
</svg>
