<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 960">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1D24"/>
      <stop offset="100%" stop-color="#06080B"/>
    </linearGradient>
    <linearGradient id="metalRedThumb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF4D52"/>
      <stop offset="45%" stop-color="#D62035"/>
      <stop offset="100%" stop-color="#7A0816"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1920" height="960" fill="url(#bg)"/>

  <!-- Hexagon + Pulse logo on the left -->
  <g transform="translate(230, 250)">
    <polygon points="240,0 432,110 432,330 240,440 48,330 48,110"
             fill="none" stroke="url(#metalRedThumb)" stroke-width="22" stroke-linejoin="round"/>
    <polyline points="118,220 188,220 222,140 256,280 290,120 324,280 358,220 392,220"
              fill="none" stroke="url(#metalRedThumb)" stroke-width="18"
              stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark line 1 -->
  <text x="750" y="430"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif"
        font-size="120" font-weight="800" fill="#FFFFFF" letter-spacing="-2">Stream Deck</text>

  <!-- Wordmark line 2 (metallic red) -->
  <text x="750" y="560"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif"
        font-size="120" font-weight="800" fill="url(#metalRedThumb)" letter-spacing="-2">Musik Viewer</text>

  <!-- Subtitle -->
  <text x="753" y="625"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif"
        font-size="38" font-weight="400" fill="#9CA3AF">Now playing on macOS</text>
</svg>
