<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 960">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1D24"/>
      <stop offset="100%" stop-color="#06080B"/>
    </linearGradient>
    <linearGradient id="metalRed2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF4D52"/>
      <stop offset="45%" stop-color="#D62035"/>
      <stop offset="100%" stop-color="#7A0816"/>
    </linearGradient>
    <linearGradient id="bodyG2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22262E"/>
      <stop offset="100%" stop-color="#0E1014"/>
    </linearGradient>
    <linearGradient id="cover2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E40AF"/>
      <stop offset="50%" stop-color="#0E3F66"/>
      <stop offset="100%" stop-color="#0A1538"/>
    </linearGradient>
    <linearGradient id="dim2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#000000" stop-opacity="0.85"/>
      <stop offset="40%" stop-color="#000000" stop-opacity="0.30"/>
      <stop offset="60%" stop-color="#000000" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <rect width="1920" height="960" fill="url(#bg2)"/>

  <!-- Headline -->
  <text x="960" y="140" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif"
        font-size="84" font-weight="800" fill="#FFFFFF" letter-spacing="-2">Instant <tspan fill="url(#metalRed2)">volume.</tspan></text>
  <text x="960" y="200" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif"
        font-size="30" font-weight="400" fill="#9CA3AF">Turn the dial — the value updates before macOS even processes it.</text>

  <!-- Hardware Mockup -->
  <g transform="translate(80, 320)">
    <rect x="0" y="0" width="700" height="420" rx="40" fill="url(#bodyG2)" stroke="#2A2F38" stroke-width="2"/>

    <g transform="translate(178, 38)">
      <rect x="0"   y="0" width="80" height="80" rx="10" fill="#15171D"/>
      <rect x="92"  y="0" width="80" height="80" rx="10" fill="#15171D"/>
      <rect x="184" y="0" width="80" height="80" rx="10" fill="#15171D"/>
      <rect x="276" y="0" width="80" height="80" rx="10" fill="#15171D"/>
      <rect x="0"   y="92" width="80" height="80" rx="10" fill="#15171D"/>
      <rect x="92"  y="92" width="80" height="80" rx="10" fill="#15171D"/>
      <rect x="184" y="92" width="80" height="80" rx="10" fill="#15171D"/>
      <rect x="276" y="92" width="80" height="80" rx="10" fill="#15171D"/>
      <g fill="#2A2F38">
        <polygon points="32,28 32,52 50,40"/>
        <circle cx="132" cy="40" r="11" fill="none" stroke="#2A2F38" stroke-width="2"/>
        <rect x="218" y="32" width="16" height="16"/>
        <rect x="310" y="32" width="4" height="16"/>
        <rect x="320" y="32" width="4" height="16"/>
        <polygon points="32,120 32,144 50,132"/>
        <circle cx="132" cy="132" r="11" fill="none" stroke="#2A2F38" stroke-width="2"/>
        <rect x="218" y="124" width="16" height="16"/>
        <rect x="310" y="124" width="4" height="16"/>
        <rect x="320" y="124" width="4" height="16"/>
      </g>
    </g>

    <g transform="translate(178, 234)">
      <rect x="0" y="0" width="356" height="74" rx="6" fill="#000000"/>
      <line x1="89"  y1="6" x2="89"  y2="68" stroke="#1F2329" stroke-width="1"/>
      <line x1="178" y1="6" x2="178" y2="68" stroke="#1F2329" stroke-width="1"/>
      <line x1="267" y1="6" x2="267" y2="68" stroke="#1F2329" stroke-width="1"/>
      <clipPath id="sec3MiniG2"><rect x="178" y="0" width="89" height="74"/></clipPath>
      <g clip-path="url(#sec3MiniG2)">
        <rect x="178" y="0" width="89" height="74" fill="url(#cover2)"/>
        <rect x="178" y="0" width="89" height="74" fill="url(#dim2)"/>
        <rect x="182" y="64" width="80" height="4" rx="2" fill="#FFFFFF" opacity="0.2"/>
        <rect x="182" y="64" width="68" height="4" rx="2" fill="url(#metalRed2)"/>
      </g>
      <rect x="176" y="-2" width="93" height="78" rx="4" fill="none" stroke="url(#metalRed2)" stroke-width="2" opacity="0.7"/>
    </g>

    <g transform="translate(178, 330)">
      <circle cx="40" cy="30" r="28" fill="#0A0C0F" stroke="#2A2F38" stroke-width="3"/>
      <circle cx="40" cy="30" r="14" fill="#15171D"/>
      <circle cx="132" cy="30" r="28" fill="#0A0C0F" stroke="#2A2F38" stroke-width="3"/>
      <circle cx="132" cy="30" r="14" fill="#15171D"/>
      <!-- Dial 3 active with rotation indicator -->
      <circle cx="224" cy="30" r="28" fill="#0A0C0F" stroke="url(#metalRed2)" stroke-width="4"/>
      <circle cx="224" cy="30" r="14" fill="#15171D"/>
      <!-- Rotation arc indicator (curved arrow around dial) -->
      <path d="M 260 30 A 36 36 0 0 1 224 66" fill="none" stroke="url(#metalRed2)" stroke-width="3" stroke-linecap="round"/>
      <polygon points="224,66 220,58 230,60" fill="url(#metalRed2)"/>
      <circle cx="316" cy="30" r="28" fill="#0A0C0F" stroke="#2A2F38" stroke-width="3"/>
      <circle cx="316" cy="30" r="14" fill="#15171D"/>
    </g>

    <rect x="32" y="376" width="48" height="6" rx="1" fill="#2A2F38"/>
  </g>

  <!-- Connector arrow -->
  <g stroke="url(#metalRed2)" stroke-width="3" fill="none" opacity="0.7">
    <path d="M 480 560 Q 600 560, 720 510" stroke-dasharray="6,6"/>
    <polygon points="720,510 706,500 712,520" fill="url(#metalRed2)" stroke="none"/>
  </g>

  <!-- Zoom Display with prominent volume -->
  <g transform="translate(840, 300)">
    <rect x="0" y="0" width="980" height="490" rx="32" fill="#000000" stroke="#2A2F38" stroke-width="3"/>
    <g transform="translate(20, 20)">
      <clipPath id="zoomG2"><rect x="0" y="0" width="940" height="450" rx="14"/></clipPath>
      <g clip-path="url(#zoomG2)">
        <rect x="0" y="0" width="940" height="450" fill="url(#cover2)"/>
        <circle cx="200" cy="140" r="140" fill="#FFFFFF" opacity="0.08"/>
        <circle cx="760" cy="340" r="110" fill="#FFFFFF" opacity="0.06"/>
        <rect x="0" y="0" width="940" height="450" fill="url(#dim2)"/>
        <text x="470" y="120" text-anchor="middle"
              font-family="-apple-system, sans-serif"
              font-size="72" font-weight="700" fill="#FFFFFF">Take Five</text>
        <text x="470" y="195" text-anchor="middle"
              font-family="-apple-system, sans-serif"
              font-size="52" font-weight="500" fill="#FFFFFF">Dave Brubeck Quartet</text>
        <!-- Prominent volume % in metallic red -->
        <text x="920" y="350" text-anchor="end"
              font-family="-apple-system, sans-serif"
              font-size="64" font-weight="800" fill="url(#metalRed2)">85%</text>
        <!-- Nearly-full bar -->
        <rect x="24" y="406" width="892" height="22" rx="6" fill="#FFFFFF" opacity="0.2"/>
        <rect x="24" y="406" width="758" height="22" rx="6" fill="url(#metalRed2)"/>
      </g>
    </g>
  </g>
</svg>
