<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgD" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1D24"/>
      <stop offset="100%" stop-color="#08090C"/>
    </linearGradient>
    <linearGradient id="metalRedD" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF4D52"/>
      <stop offset="45%" stop-color="#D62035"/>
      <stop offset="100%" stop-color="#7A0816"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bgD)"/>
  <!-- Hexagon outline -->
  <polygon points="256,90 410,178 410,334 256,422 102,334 102,178"
           fill="none" stroke="url(#metalRedD)" stroke-width="22" stroke-linejoin="round"/>
  <!-- Pulse line inside -->
  <polyline points="140,256 200,256 230,200 260,310 290,180 320,310 350,256 372,256"
            fill="none" stroke="url(#metalRedD)" stroke-width="18"
            stroke-linecap="round" stroke-linejoin="round"/>
</svg>
