<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 960">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1F2329"/>
      <stop offset="100%" stop-color="#0A0C0F"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1920" height="960" fill="url(#bg)"/>

  <!-- Note icon on the left -->
  <g fill="#2DD4BF" transform="translate(220, 230) scale(1.0)">
    <rect x="276" y="124" width="32" height="248"/>
    <circle cx="208" cy="372" r="76"/>
    <polygon points="308,124 408,164 408,252 308,212"/>
  </g>

  <!-- Wordmark line 1 -->
  <text x="750" y="430"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif"
        font-size="120" font-weight="800" fill="#FFFFFF" letter-spacing="-2">Stream Deck</text>

  <!-- Wordmark line 2 (teal accent) -->
  <text x="750" y="560"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif"
        font-size="120" font-weight="800" fill="#2DD4BF" letter-spacing="-2">Musik Viewer</text>

  <!-- Subtitle -->
  <text x="753" y="625"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif"
        font-size="38" font-weight="400" fill="#9CA3AF">Now playing on macOS</text>
</svg>
