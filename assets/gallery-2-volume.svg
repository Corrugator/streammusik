<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 960">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1F2329"/>
      <stop offset="100%" stop-color="#0A0C0F"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2DD4BF"/>
      <stop offset="100%" stop-color="#22B8A1"/>
    </linearGradient>
  </defs>

  <rect width="1920" height="960" fill="url(#bg2)"/>

  <!-- Left: Headline + description -->
  <text x="140" y="380"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif"
        font-size="80" font-weight="800" fill="#FFFFFF" letter-spacing="-2">Instant</text>
  <text x="140" y="475"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif"
        font-size="80" font-weight="800" fill="#2DD4BF" letter-spacing="-2">volume.</text>
  <text x="142" y="565"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif"
        font-size="34" font-weight="400" fill="#9CA3AF">Turn the dial — the value updates</text>
  <text x="142" y="612"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif"
        font-size="34" font-weight="400" fill="#9CA3AF">before macOS even processes it.</text>

  <!-- Right: Encoder mockup with prominent volume bar -->
  <g transform="translate(900, 260)">
    <rect x="0" y="0" width="880" height="440" rx="32" fill="#000000" stroke="#2A2F38" stroke-width="3"/>
    <rect x="20" y="20" width="840" height="400" rx="14" fill="#0E1014"/>

    <!-- Track name -->
    <text x="440" y="120" text-anchor="middle"
          font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif"
          font-size="56" font-weight="700" fill="#FFFFFF">Take Five</text>
    <text x="440" y="180" text-anchor="middle"
          font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif"
          font-size="42" font-weight="400" fill="#B8B8B8">Dave Brubeck Quartet</text>

    <!-- Cover -->
    <rect x="60" y="220" width="170" height="170" rx="6" fill="#1E40AF"/>
    <rect x="60" y="220" width="170" height="170" rx="6" fill="url(#bar2)" opacity="0.25"/>

    <!-- Volume prominent (big %) -->
    <text x="820" y="280" text-anchor="end"
          font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif"
          font-size="64" font-weight="700" fill="#2DD4BF">85%</text>

    <!-- Volume bar (more filled) -->
    <rect x="260" y="350" width="560" height="36" rx="6" fill="#2A2F38"/>
    <rect x="260" y="350" width="476" height="36" rx="6" fill="url(#bar2)"/>
  </g>
</svg>
