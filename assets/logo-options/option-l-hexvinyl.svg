<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1D24"/>
      <stop offset="100%" stop-color="#08090C"/>
    </linearGradient>
    <linearGradient id="metalRedL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF4D52"/>
      <stop offset="45%" stop-color="#D62035"/>
      <stop offset="100%" stop-color="#7A0816"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bgL)"/>
  <polygon points="256,90 410,178 410,334 256,422 102,334 102,178"
           fill="none" stroke="url(#metalRedL)" stroke-width="22" stroke-linejoin="round"/>
  <!-- Vinyl record: outer ring + center label + center hole -->
  <g>
    <circle cx="256" cy="256" r="100" fill="none" stroke="url(#metalRedL)" stroke-width="14"/>
    <circle cx="256" cy="256" r="78"  fill="none" stroke="url(#metalRedL)" stroke-width="2" opacity="0.4"/>
    <circle cx="256" cy="256" r="58"  fill="none" stroke="url(#metalRedL)" stroke-width="2" opacity="0.4"/>
    <circle cx="256" cy="256" r="40" fill="url(#metalRedL)"/>
    <circle cx="256" cy="256" r="9" fill="#0E1014"/>
  </g>
</svg>
